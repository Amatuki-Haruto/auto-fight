# Render デプロイ用（クレジットカード不要）
services:
  - type: web
    name: arukemisuto-autoclick
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_server.py
    healthCheckPath: /health
    # 市場価格自動取得する場合は以下を Environment で設定:
    # MYSHOP_COOKIES=(export_myshop_cookies.py の出力、Secret)
    # MYSHOP_AUTO_FETCH=1
