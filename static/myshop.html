<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>市場 価格推移 - あるけみすと</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app-wrap">
    <header class="header">
      <div class="header-brand">
        <a href="/"><img class="logo" src="/static/logo.png" alt="" width="40" height="40"></a>
        <div>
          <h1>市場 価格推移</h1>
          <p class="subtitle">myshop の価格を記録・表示</p>
        </div>
      </div>
      <a href="/" class="btn btn-link">← 自動探索に戻る</a>
    </header>

    <section class="card card-glow">
      <h2>🤖 自動取得（ブラウザ経由）</h2>
      <p class="muted">ゲームにログイン済みのブラウザプロファイルを使って市場ページを自動取得します。事前に auto_click.py で一度ログインしてください。<br>※ auto_click 実行中はブラウザが占有されるため失敗する場合があります。その場合は「手動取り込み」をご利用ください。</p>
      <div class="btns" style="margin-top:0.5rem">
        <button type="button" class="btn btn-start" id="fetchNowBtn">今すぐ取得</button>
      </div>
      <p id="fetchResult" class="muted" style="margin-top:0.5rem"></p>
    </section>

    <section class="card card-glow">
      <h2>📥 手動取り込み（HTML貼り付け）</h2>
      <p class="muted">市場(ゲーム内)のページを「名前を付けて保存」でHTML保存し、そのファイルの内容を以下に貼り付けて「取り込む」を押してください。</p>
      <textarea id="htmlInput" placeholder="<!DOCTYPE html>... ここにHTMLを貼り付け ..." rows="6" style="width:100%;font-family:monospace;font-size:0.8rem;padding:0.5rem;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);"></textarea>
      <div class="btns" style="margin-top:0.5rem">
        <button type="button" class="btn btn-start" id="importBtn">取り込む</button>
        <input type="file" id="fileInput" accept=".html,.htm" style="display:none">
        <button type="button" class="btn btn-link" id="fileBtn">ファイルから選択</button>
      </div>
      <p id="importResult" class="muted" style="margin-top:0.5rem"></p>
    </section>

    <section class="card card-glow">
      <h2>📊 価格サマリ（直近30日）</h2>
      <div class="filter-row" style="margin-bottom:0.75rem">
        <span class="filter-label">カテゴリ:</span>
        <select id="categoryFilter">
          <option value="">全て</option>
          <option value="武器">武器</option>
          <option value="頭具">頭具</option>
          <option value="防具">防具</option>
          <option value="足具">足具</option>
          <option value="アクセサリー">アクセサリー</option>
          <option value="アイテム">アイテム</option>
        </select>
      </div>
      <div id="priceTable" class="price-table"></div>
    </section>
  </div>

  <script>
    const htmlInput = document.getElementById('htmlInput');
    const importBtn = document.getElementById('importBtn');
    const fileInput = document.getElementById('fileInput');
    const fileBtn = document.getElementById('fileBtn');
    const importResult = document.getElementById('importResult');
    const fetchNowBtn = document.getElementById('fetchNowBtn');
    const fetchResult = document.getElementById('fetchResult');
    const categoryFilter = document.getElementById('categoryFilter');
    const priceTable = document.getElementById('priceTable');

    fetchNowBtn.addEventListener('click', async () => {
      fetchNowBtn.disabled = true;
      fetchResult.textContent = '取得中...（10〜20秒かかります）';
      try {
        const r = await fetch('/api/myshop/fetch-now', { method: 'POST' });
        const d = await r.json();
        if (d.error) {
          fetchResult.textContent = 'エラー: ' + d.error;
        } else {
          fetchResult.textContent = d.count + '件の価格を記録しました';
          loadSummary();
        }
      } catch (e) {
        fetchResult.textContent = 'エラー: ' + e.message;
      }
      fetchNowBtn.disabled = false;
    });

    fileBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => { htmlInput.value = r.result; };
      r.readAsText(f, 'UTF-8');
    });

    importBtn.addEventListener('click', async () => {
      const html = htmlInput.value.trim();
      if (!html || !html.includes('<' )) {
        importResult.textContent = 'HTMLを貼り付けてください';
        return;
      }
      importBtn.disabled = true;
      importResult.textContent = '送信中...';
      try {
        const r = await fetch('/api/myshop/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ html }),
        });
        const d = await r.json();
        if (d.error) {
          importResult.textContent = d.error;
        } else {
          importResult.textContent = `${d.count}件の価格を記録しました`;
          loadSummary();
        }
      } catch (e) {
        importResult.textContent = 'エラー: ' + e.message;
      }
      importBtn.disabled = false;
    });

    async function loadSummary() {
      const cat = categoryFilter.value || undefined;
      try {
        const r = await fetch('/api/myshop/summary?days=30' + (cat ? '&category=' + encodeURIComponent(cat) : ''));
        const d = await r.json();
        if (d.items && d.items.length > 0) {
          priceTable.innerHTML = '<table style="width:100%;font-size:0.85rem"><thead><tr><th>カテゴリ</th><th>アイテム</th><th>最安</th><th>最高</th><th>平均</th><th>件数</th></tr></thead><tbody>' +
            d.items.map(i => 
              '<tr><td>' + (i.category || '-') + '</td><td>' + escapeHtml(i.item_name) + (i.enhance ? '+' + i.enhance : '') + '</td><td>' + i.min_price + '</td><td>' + i.max_price + '</td><td>' + Math.round(i.avg_price) + '</td><td>' + i.sample_count + '</td></tr>'
            ).join('') + '</tbody></table>';
        } else {
          priceTable.innerHTML = '<p class="muted">まだ記録がありません。HTMLを取り込んでください。</p>';
        }
      } catch (e) {
        priceTable.innerHTML = '<p class="muted">読み込みエラー</p>';
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    categoryFilter.addEventListener('change', loadSummary);
    loadSummary();
  </script>
</body>
</html>
