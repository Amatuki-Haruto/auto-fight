<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>あるけみすと 自動探索</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app-wrap">
    <header class="header">
      <h1><span class="icon">⚔️</span> あるけみすと 自動探索</h1>
      <button class="theme-btn" id="themeBtn" title="テーマ切替 (T)" aria-label="テーマ切替">🌙</button>
    </header>

    <div class="status-bar" id="statusBar">
      <div class="status" id="status" role="status" aria-live="polite" aria-busy="true">接続中...</div>
      <div id="stopReason" class="stop-reason-box" style="display:none" role="alert"></div>
      <div id="offlineMsg" class="offline" style="display:none" role="alert">
        オフラインです。ネットワーク回復後に自動で再接続します。
      </div>
    </div>

    <nav class="tabs" role="tablist">
      <button type="button" class="tab active" data-tab="dashboard" role="tab" aria-selected="true">📊 状況</button>
      <button type="button" class="tab" data-tab="drops" role="tab">🏆 ドロップ</button>
      <button type="button" class="tab" data-tab="activity" role="tab">📜 ログ</button>
      <button type="button" class="tab" data-tab="stats" role="tab">📈 統計</button>
    </nav>

    <main class="main">
      <!-- タブ: 状況 -->
      <section id="tab-dashboard" class="tab-panel active" role="tabpanel">
        <div class="stats-grid">
          <div class="stat">
            <div class="val" id="statLevel">-</div>
            <div class="label">レベル</div>
          </div>
          <div class="stat">
            <div class="val count-up" id="statLoop">0</div>
            <div class="label">周回数</div>
          </div>
          <div class="stat">
            <div class="val" id="statTime">--:--</div>
            <div class="label">経過時間</div>
          </div>
          <div class="stat">
            <div class="val" id="statExp">0</div>
            <div class="label">獲得経験値</div>
          </div>
          <div class="stat">
            <div class="val" id="statExpPerLoop">-</div>
            <div class="label">1周あたりEXP</div>
          </div>
          <div class="stat">
            <div class="val" id="statDrops">0</div>
            <div class="label">ドロップ数</div>
          </div>
        </div>
        <div class="btns">
          <button type="button" class="btn btn-start" id="startBtn" aria-label="自動探索開始 (Enter)">▶ 自動探索開始</button>
          <button type="button" class="btn btn-stop" id="stopBtn" disabled aria-label="停止 (Esc)">■ 停止</button>
          <a href="https://games-alchemist.com/home/" target="_blank" rel="noopener" class="btn btn-link">🎮 ゲームを開く</a>
        </div>
        <div class="last-result card">
          <h2>📋 直近の結果</h2>
          <div id="lastMessage" class="activity-item" style="display:none">
            <span class="loop" id="loopCount"></span>
            <span class="msg" id="lastMsgText"></span>
            <div class="drops" id="lastMsgDrops"></div>
          </div>
          <p id="noResult" class="muted">まだ探索結果がありません</p>
        </div>
      </section>

      <!-- タブ: ドロップ -->
      <section id="tab-drops" class="tab-panel" role="tabpanel">
        <div class="drop-controls">
          <div class="drop-ranks" id="dropRanks"><span class="C">まだなし</span></div>
          <div class="filter-row">
            <span class="filter-label">フィルタ:</span>
            <select id="dropFilter" title="ランクでフィルタ">
              <option value="">全ランク</option>
              <option value="S">Sのみ</option>
              <option value="A">Aのみ</option>
              <option value="B">Bのみ</option>
              <option value="C">Cのみ</option>
              <option value="D">Dのみ</option>
              <option value="E">Eのみ</option>
              <option value="F">Fのみ</option>
            </select>
            <button type="button" class="sort-btn" id="sortDropsBtn">並び替え</button>
          </div>
        </div>
        <div class="drops-list" id="dropsList"></div>
      </section>

      <!-- タブ: アクティビティ -->
      <section id="tab-activity" class="tab-panel" role="tabpanel">
        <h2>📜 アクティビティログ</h2>
        <div class="activity" id="activityLog"></div>
      </section>

      <!-- タブ: 統計 -->
      <section id="tab-stats" class="tab-panel" role="tabpanel">
        <h2>📈 経験値推移</h2>
        <div class="chart-container" id="expChart"></div>
        <div class="stats-summary" id="statsSummary"></div>
        <details class="steps">
          <summary>🚀 起動手順</summary>
          <p>1. <code>python3 auto_click.py</code> を実行<br>
          2. Braveでゲームにログイン<br>
          3. 「自動探索開始」を押す（または Enter キー）</p>
          <p class="kbd-hint">💡 Enter: 開始 / Esc: 停止</p>
        </details>
      </section>
    </main>
  </div>

  <script src="/static/js/main.js" defer></script>
</body>
</html>
