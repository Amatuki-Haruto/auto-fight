# Fly.io デプロイ用設定
# fly launch で自動作成されるが、事前に用意可能
# アプリ名が重複する場合は fly launch --name 別名 で上書き

app = "arukemisuto-autoclick"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"
